<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinGSEC | Login</title>

    <link rel="stylesheet" href="index.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

    <main class="auth-container">

        <div class="auth-card">

            <!-- TOPO -->
            <div class="top-login">

                <img src="assets/img/baner.png" class="logo" alt="FinGSEC">

            </div>

            <!-- LOGIN -->
            <div id="formLogin" class="auth-form active">

                <h1 class="auth-title">Bem-vindo!</h1>

                <p class="auth-subtitle">
                    Entre para acessar sua conta.
                </p>

                <form id="loginForm">

                    <div class="input-group">

                        <div class="input-wrapper">

                            <i class="fas fa-envelope input-icon"></i>

                            <input
                                type="email"
                                id="loginEmail"
                                placeholder="Digite seu e-mail">

                        </div>

                        <span
                            id="loginEmailError"
                            class="error-msg"></span>

                    </div>

                    <div class="input-group">

                        <div class="input-wrapper">

                            <i class="fas fa-lock input-icon"></i>

                            <input
                                type="password"
                                id="loginPassword"
                                placeholder="Digite sua senha">

                            <button
                                type="button"
                                class="toggle-password"
                                data-target="loginPassword">

                                <i class="fas fa-eye"></i>

                            </button>

                        </div>

                        <span
                            id="loginPasswordError"
                            class="error-msg"></span>

                    </div>

                    <div class="login-options">

                        <label>

                            <input type="checkbox">

                            Lembrar-me

                        </label>

                        <a href="#">

                            Esqueceu a senha?

                        </a>

                    </div>

                    <button
                        class="btn btn-primary"
                        type="submit">

                        Entrar

                    </button>

                </form>

                <div class="divider">

                    <span>OU</span>

                </div>

                <div class="social-login">

                    <button>

                        <i class="fab fa-google"></i>

                    </button>

                    <button>

                        <i class="fab fa-github"></i>

                    </button>

                    <button>

                        <i class="fab fa-facebook-f"></i>

                    </button>

                </div>

                <p class="auth-switch">

                    Não possui conta?

                    <button
                        id="goToCadastro"
                        class="link-btn"
                        type="button">

                        Criar Conta

                    </button>

                </p>

            </div>

            <!-- CADASTRO -->

            <div id="formCadastro" class="auth-form">

                <h1 class="auth-title">

                    Criar Conta

                </h1>

                <p class="auth-subtitle">

                    Crie sua conta gratuitamente.

                </p>

                <form id="cadastroForm">

                    <div class="input-group">

                        <div class="input-wrapper">

                            <i class="fas fa-user input-icon"></i>

                            <input
                                id="cadastroNome"
                                type="text"
                                placeholder="Nome completo">

                        </div>

                        <span
                            id="cadastroNomeError"
                            class="error-msg"></span>

                    </div>

                    <div class="input-group">

                        <div class="input-wrapper">

                            <i class="fas fa-envelope input-icon"></i>

                            <input
                                id="cadastroEmail"
                                type="email"
                                placeholder="Digite seu e-mail">

                        </div>

                        <span
                            id="cadastroEmailError"
                            class="error-msg"></span>

                    </div>

                    <div class="input-group">

                        <div class="input-wrapper">

                            <i class="fas fa-lock input-icon"></i>

                            <input
                                id="cadastroPassword"
                                type="password"
                                placeholder="Crie uma senha">

                            <button
                                type="button"
                                class="toggle-password"
                                data-target="cadastroPassword">

                                <i class="fas fa-eye"></i>

                            </button>

                        </div>

                        <span
                            id="cadastroPasswordError"
                            class="error-msg"></span>

                    </div>

                    <div class="input-group">

                        <div class="input-wrapper">

                            <i class="fas fa-lock input-icon"></i>

                            <input
                                id="cadastroConfirm"
                                type="password"
                                placeholder="Confirmar senha">

                            <button
                                type="button"
                                class="toggle-password"
                                data-target="cadastroConfirm">

                                <i class="fas fa-eye"></i>

                            </button>

                        </div>

                        <span
                            id="cadastroConfirmError"
                            class="error-msg"></span>

                    </div>

                    <button
                        class="btn btn-primary"
                        type="submit">

                        Criar Conta

                    </button>

                </form>

                <p class="auth-switch">

                    Já possui conta?

                    <button
                        id="goToLogin"
                        class="link-btn"
                        type="button">

                        Entrar

                    </button>

                </p>

            </div>

            <!-- SUCESSO -->

            <div
                id="successMessage"
                class="success-message">

                <i class="fas fa-circle-check"></i>

                <p>

                    Conta criada com sucesso!

                </p>

            </div>

        </div>

    </main>

    <script src="index.js"></script>

</body>

</html>
