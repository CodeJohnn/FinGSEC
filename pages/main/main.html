<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Controle Financeiro</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div class="container">
      
        </header>
        <!-- Resumo do saldo -->
        <section class="resumo">
            <div class="cartao saldo">
                <span class="rotulo">Saldo Total</span>
                <span class="valor" id="saldoTotal">R$ 0,00</span>
            </div>
            <div class="cartao receitas">
                <span class="rotulo">Receitas</span>
                <span class="valor positivo" id="totalReceitas">R$ 0,00</span>
            </div>
            <div class="cartao despesas">
                <span class="rotulo">Despesas</span>
                <span class="valor negativo" id="totalDespesas">R$ 0,00</span>
            </div>
        </section>

        <!-- Formulário para adicionar transação -->
        <section class="formulario">
            <h2>Nova Transação</h2>
            <form id="formTransacao">
                <div class="campo">
                    <label for="tipo">Tipo</label>
                    <select id="tipo" required>
                        <option value="receita">Receita</option>
                        <option value="despesa">Despesa</option>
                    </select>
                </div>
                <div class="campo">
                    <label for="descricao">Descrição</label>
                    <input type="text" id="descricao" placeholder="Ex: Salário, Aluguel..." required>
                </div>
                <div class="campo">
                    <label for="valor">Valor (R$)</label>
                    <input type="number" id="valor" placeholder="0,00" step="0.01" min="0.01" required>
                </div>
                <div class="campo">
                    <label for="data">Data</label>
                    <input type="date" id="data" required>
                </div>
                <button type="submit" class="btn-adicionar">Adicionar</button>
            </form>
        </section>

        <!-- Lista de transações -->
        <section class="transacoes">
            <h2>Transações</h2>
            <ul id="listaTransacoes">
                <!-- Itens inseridos via JavaScript -->
            </ul>
            <p class="vazio" id="mensagemVazia">Nenhuma transação registrada.</p>
        </section>
    </div>

    <script src="main.js"></script>
</body>
</html>
